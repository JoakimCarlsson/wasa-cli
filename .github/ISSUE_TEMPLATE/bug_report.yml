name: Bug report
description: Report a problem with wasa
labels: ["kind/bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What's wrong
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Helpful for anything platform- or tmux-related.
      placeholder: |
        wasa --version:
        OS:
        tmux -V:
        agent:
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      render: shell
    validations:
      required: false
