name: Bug report
description: Report a problem with wasa
labels: ["kind/bug"]
body:
  - type: input
    id: version
    attributes:
      label: wasa version
      description: Output of `wasa --version`
      placeholder: e.g. v0.3.1
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: OS / platform
      options:
        - Linux
        - macOS
        - Windows + WSL2
    validations:
      required: true
  - type: input
    id: tmux
    attributes:
      label: tmux version
      description: Output of `tmux -V`
      placeholder: e.g. tmux 3.6
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Which agent
      options:
        - claude
        - codex
        - copilot
        - gemini
        - cursor
        - aider
        - plain shell
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Describe the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Paste any relevant logs or terminal output.
      render: shell
    validations:
      required: false
